<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUreplay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <main class="page">
        <div class="workspace-header">
          <h1>MUreplay</h1>
          <div class="header-actions">
            <span class="headline load-headline">Load log file</span>
            <button
              class="browse-icon-btn"
              id="loadMenuBtn"
              type="button"
              aria-label="Load files"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6.75 12-3-3m0 0-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"
                />
              </svg>
            </button>
            <span id="status" class="status-pill hidden">Load edited file and log</span>
          </div>
        </div>

        <section class="workspace">
          <div class="stage stage-edit active" id="stageEdit">
            <div class="edit-top-row">
              <div class="chart-card glass">
                <div class="edit-controls-row">
                  <div class="mu-controls edit-selects">
                    <select id="editMuGridSelect" aria-label="Grid"></select>
                    <select id="editMuSelect" aria-label="Motor unit"></select>
                  </div>

                  <div class="timeline-toolbar" role="toolbar" aria-label="Replay timeline controls">
                    <button id="prevStepBtn" class="pill-toggle" type="button" aria-label="Previous step">⏮</button>
                    <input id="timelineSlider" type="range" min="0" max="0" value="0" step="1" />
                    <button id="nextStepBtn" class="pill-toggle" type="button" aria-label="Next step">⏭</button>
                    <button id="playPauseBtn" class="pill-toggle" type="button" aria-label="Play or pause">▶</button>
                    <span id="timelineCounter" class="timeline-counter">Step 0 / 0</span>
                  </div>
                </div>
                <span id="editStatus" class="status-pill" aria-live="polite"></span>
              </div>
            </div>

            <div class="chart-card glass edit-full" id="editDrCard">
              <div class="chart-title">Firing Rate (pps)</div>
              <canvas id="editDrCanvas" height="180" class="mu-canvas muted-bg"></canvas>
            </div>

            <div class="chart-card glass edit-full" id="editPulseCard">
              <div class="chart-title">Pulse Train / Discharge Times</div>
              <canvas id="editPulseCanvas" height="220" class="mu-canvas"></canvas>
              <canvas id="editTimelineCanvas" class="edit-timeline-canvas" aria-label="Navigation timeline"></canvas>
            </div>

          </div>
        </section>
      </main>
    </div>

    <script src="runtime-config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
